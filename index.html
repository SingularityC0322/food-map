<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的美食地图</title>
<style>
  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #0F6E56;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --amber: #EF9F27;
    --amber-light: #FAEEDA;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --gray-50: #F9F9F8;
    --gray-100: #F1EFE8;
    --gray-200: #D3D1C7;
    --gray-500: #888780;
    --gray-800: #2C2C2A;
    --text: #1A1A1A;
    --text-muted: #666;
    --text-hint: #999;
    --border: rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: var(--gray-50); color: var(--text); min-height: 100vh; }

  .app { max-width: 680px; margin: 0 auto; padding: 0 16px 100px; }
  .header { padding: 32px 0 20px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .header-sub { font-size: 13px; color: var(--text-hint); margin-top: 4px; }

  .nav { display: flex; gap: 4px; background: white; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 10; }
  .nav-btn { flex: 1; padding: 8px; border: none; background: transparent; font-size: 13px; color: var(--text-muted); cursor: pointer; border-radius: var(--radius-sm); transition: all 0.15s; font-family: inherit; }
  .nav-btn.active { background: var(--gray-50); color: var(--text); font-weight: 600; }

  .section { display: none; }
  .section.active { display: block; }

  .fab { position: fixed; bottom: 28px; right: 50%; transform: translateX(50%); max-width: 680px; width: calc(100% - 32px); background: var(--text); color: white; border: none; border-radius: var(--radius); padding: 15px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 0.2px; z-index: 20; }
  .fab.locked { background: var(--gray-200); color: var(--text-muted); }

  .modal-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-wrap.open { display: flex; }
  .modal { background: white; border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--gray-200); border-radius: 2px; margin: 0 auto 20px; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.04em; display: block; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; color: var(--text); background: var(--gray-50); outline: none; transition: border 0.15s; }
  .form-input:focus { border-color: var(--teal); background: white; }
  textarea.form-input { resize: none; min-height: 80px; line-height: 1.5; }
  .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .type-btn { padding: 10px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; transition: all 0.15s; }
  .type-btn.sel-ingredient { border-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); font-weight: 600; }
  .type-btn.sel-pairing { border-color: var(--purple); background: var(--purple-light); color: #3C3489; font-weight: 600; }
  .type-btn.sel-restaurant { border-color: var(--amber); background: var(--amber-light); color: #633806; font-weight: 600; }
  .type-btn.sel-eating { border-color: var(--coral); background: var(--coral-light); color: #712B13; font-weight: 600; }
  .rating-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .rating-btn { padding: 9px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; font-size: 12px; cursor: pointer; font-family: inherit; text-align: center; transition: all 0.15s; }
  .rating-btn.selected { border-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); font-weight: 600; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-submit { width: 100%; padding: 15px; background: var(--text); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
  .btn-cancel { width: 100%; padding: 13px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; cursor: pointer; font-family: inherit; margin-top: 8px; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 13px; color: var(--text-muted); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s; flex-shrink: 0; }
  .pill.active { background: var(--text); color: white; border-color: var(--text); }
  .search-box { position: relative; margin-bottom: 16px; }
  .search-box input { width: 100%; padding: 11px 14px 11px 38px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: white; outline: none; color: var(--text); }
  .search-box input:focus { border-color: var(--teal); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 16px; pointer-events: none; }
  .entries { display: flex; flex-direction: column; gap: 8px; }
  .entry-card { background: white; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; gap: 12px; }
  .entry-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .dot-ingredient { background: var(--teal); }
  .dot-pairing { background: var(--purple); }
  .dot-restaurant { background: var(--amber); }
  .dot-eating { background: var(--coral); }
  .entry-body { flex: 1; min-width: 0; }
  .entry-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .entry-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .tag-ingredient { background: var(--teal-light); color: var(--teal-dark); }
  .tag-pairing { background: var(--purple-light); color: #3C3489; }
  .tag-restaurant { background: var(--amber-light); color: #633806; }
  .tag-eating { background: var(--coral-light); color: #712B13; }
  .entry-cuisine { font-size: 12px; color: var(--text-muted); }
  .entry-place { font-size: 12px; color: var(--text-hint); }
  .entry-note { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-top: 4px; }
  .entry-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .entry-date { font-size: 11px; color: var(--text-hint); }
  .entry-rating { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--gray-100); color: var(--text-muted); }
  .btn-del { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 18px; padding: 0; line-height: 1; }
  .btn-del:hover { color: #E24B4A; }
  .empty { text-align: center; padding: 60px 20px; color: var(--text-hint); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  .map-region { margin-bottom: 24px; }
  .region-title { font-size: 11px; font-weight: 700; color: var(--text-hint); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .cuisine-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .cuisine-card { background: white; border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; cursor: pointer; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
  .cuisine-card:hover { border-color: var(--gray-200); background: var(--gray-50); }
  .cuisine-card.explored { border-color: #9FE1CB; }
  .cuisine-name { font-size: 14px; color: var(--text); }
  .cuisine-badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: var(--gray-100); color: var(--text-hint); }
  .cuisine-card.explored .cuisine-badge { background: var(--teal-light); color: var(--teal-dark); font-weight: 600; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: white; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-n { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-l { font-size: 12px; color: var(--text-muted); }
  .chart-section { background: white; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 14px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { font-size: 13px; color: var(--text); width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--teal); border-radius: 3px; }
  .bar-count { font-size: 12px; color: var(--text-hint); width: 20px; text-align: right; flex-shrink: 0; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--gray-800); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* 密码弹窗 */
  .pw-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; }
  .pw-overlay.open { display: flex; }
  .pw-box { background: white; border-radius: var(--radius); padding: 28px 24px; width: 320px; max-width: 90vw; text-align: center; }
  .pw-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .pw-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .pw-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; font-family: inherit; text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 12px; }
  .pw-input:focus { border-color: var(--teal); }
  .pw-input.error { border-color: #E24B4A; animation: shake 0.3s; }
  .pw-submit { width: 100%; padding: 13px; background: var(--text); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .pw-cancel { width: 100%; padding: 10px; background: transparent; color: var(--text-muted); border: none; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 6px; }
  .lock-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-hint); background: var(--gray-100); padding: 4px 10px; border-radius: 20px; cursor: pointer; }
  .lock-badge.unlocked { color: var(--teal-dark); background: var(--teal-light); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>我的美食地图</h1>
        <div class="header-sub" id="headerSub">加载中...</div>
      </div>
      <div id="lockBadge" class="lock-badge" onclick="handleLockClick()">
        <span id="lockIcon">🔒</span>
        <span id="lockText">只读模式</span>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('feed')">动态</button>
    <button class="nav-btn" onclick="switchTab('map')">菜系</button>
    <button class="nav-btn" onclick="switchTab('stats')">统计</button>
  </div>

  <div id="feed" class="section active">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="搜索食材、餐厅、菜系..." oninput="renderFeed(this.value)" id="searchInput" />
    </div>
    <div class="filter-row">
      <button class="pill active" onclick="setFilter('all',this)">全部</button>
      <button class="pill" onclick="setFilter('ingredient',this)">食材</button>
      <button class="pill" onclick="setFilter('pairing',this)">搭配</button>
      <button class="pill" onclick="setFilter('restaurant',this)">餐厅</button>
      <button class="pill" onclick="setFilter('eating',this)">吃法</button>
    </div>
    <div class="entries" id="feedList"></div>
  </div>

  <div id="map" class="section">
    <div id="mapContent"></div>
  </div>

  <div id="stats" class="section">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-section">
      <div class="chart-title">探索最多的菜系</div>
      <div id="chartBars"></div>
    </div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="handleFabClick()">+ 新记录</button>

<!-- 新记录弹窗 -->
<div class="modal-wrap" id="modalWrap" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>添加记录</h2>
    <div class="form-group">
      <label class="form-label">类型</label>
      <div class="type-grid">
        <button class="type-btn" onclick="selectType('ingredient',this)">食材</button>
        <button class="type-btn" onclick="selectType('pairing',this)">搭配</button>
        <button class="type-btn" onclick="selectType('restaurant',this)">餐厅</button>
        <button class="type-btn" onclick="selectType('eating',this)">吃法</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">名称</label>
      <input type="text" class="form-input" id="fName" placeholder="比如：剥皮辣椒、秋葵山药泥纳豆拌饭" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">菜系</label>
        <select class="form-input" id="fCuisine"></select>
      </div>
      <div class="form-group">
        <label class="form-label">地点（可选）</label>
        <input type="text" class="form-input" id="fPlace" placeholder="台北、东京..." />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">感受</label>
      <textarea class="form-input" id="fNote" placeholder="一句话记录味道和感受"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">推荐程度</label>
      <div class="rating-grid">
        <button class="rating-btn" onclick="selectRating('必试',this)">必试</button>
        <button class="rating-btn" onclick="selectRating('值得一吃',this)">值得一吃</button>
        <button class="rating-btn" onclick="selectRating('一般',this)">一般</button>
        <button class="rating-btn" onclick="selectRating('不推荐',this)">不推荐</button>
      </div>
    </div>
    <button class="btn-submit" onclick="saveEntry()">保存</button>
    <button class="btn-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- 密码弹窗 -->
<div class="pw-overlay" id="pwOverlay" onclick="if(event.target===this)closePw()">
  <div class="pw-box">
    <h3>编辑模式</h3>
    <p>输入密码后可以新增和删除记录</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitPw()" />
    <button class="pw-submit" onclick="submitPw()">确认</button>
    <button class="pw-cancel" onclick="closePw()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const TYPE_LABELS = {ingredient:'食材', pairing:'搭配', restaurant:'餐厅', eating:'吃法'};

let data = [];
let currentFilter = 'all';
let selectedType = 'ingredient';
let selectedRating = '';
let saving = false;
let isUnlocked = false;

function checkSession() {
  isUnlocked = sessionStorage.getItem(PW_SESSION_KEY) === '1';
  updateLockUI();
}

function updateLockUI() {
  const badge = document.getElementById('lockBadge');
  const icon = document.getElementById('lockIcon');
  const text = document.getElementById('lockText');
  const fab = document.getElementById('fabBtn');
  if (isUnlocked) {
    badge.className = 'lock-badge unlocked';
    icon.textContent = '🔓';
    text.textContent = '编辑中';
    fab.className = 'fab';
    fab.textContent = '+ 新记录';
  } else {
    badge.className = 'lock-badge';
    icon.textContent = '🔒';
    text.textContent = '只读模式';
    fab.className = 'fab locked';
    fab.textContent = '🔒 需要密码才能编辑';
  }
}

function handleLockClick() {
  if (isUnlocked) {
    isUnlocked = false;
    sessionStorage.removeItem(PW_SESSION_KEY);
    updateLockUI();
    showToast('已切换为只读模式');
  } else {
    openPw();
  }
}

function handleFabClick() {
  if (!isUnlocked) { openPw(); return; }
  openModal();
}

function openPw() {
  document.getElementById('pwInput').value = '';
  document.getElementById('pwInput').className = 'pw-input';
  document.getElementById('pwOverlay').classList.add('open');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}

function closePw() {
  document.getElementById('pwOverlay').classList.remove('open');
}

function submitPw() {
  const val = document.getElementById('pwInput').value;
  if (val === EDIT_PASSWORD) {
    isUnlocked = true;
    sessionStorage.setItem(PW_SESSION_KEY, '1');
    closePw();
    updateLockUI();
    showToast('已解锁编辑模式');
  } else {
    const input = document.getElementById('pwInput');
    input.className = 'pw-input error';
    input.value = '';
    setTimeout(() => input.className = 'pw-input', 600);
    showToast('密码错误');
  }
}

async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.method === 'POST' ? 'return=representation' : '',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadData() {
  try {
    data = await sbFetch('entries?order=created_at.desc&limit=500') || [];
  } catch(e) {
    showToast('加载失败，请刷新重试');
  }
}

function updateHeader() {
  const cuisines = new Set(data.map(e => e.cuisine_id)).size;
  document.getElementById('headerSub').textContent = `${data.length} 条记录 · ${cuisines} 个菜系`;
}

function populateCuisineSelect() {
  const sel = document.getElementById('fCuisine');
  let html = '';
  REGIONS.forEach(region => {
    const items = CUISINES.filter(c => c.region === region);
    html += `<optgroup label="${region}">`;
    items.forEach(c => { html += `<option value="${c.id}|${c.name}">${c.name}</option>`; });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

function selectType(type, btn) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  btn.classList.add('sel-' + type);
}

function selectRating(rating, btn) {
  selectedRating = rating;
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function openModal() {
  selectedType = 'ingredient';
  selectedRating = '';
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('fName').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fPlace').value = '';
  document.getElementById('modalWrap').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 300);
}

function closeModal() {
  document.getElementById('modalWrap').classList.remove('open');
}

async function saveEntry() {
  if (saving || !isUnlocked) return;
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('请填写名称'); return; }
  const [cuisineId, cuisineName] = document.getElementById('fCuisine').value.split('|');
  const entry = {
    name, type: selectedType,
    cuisine_id: cuisineId, cuisine_name: cuisineName,
    place: document.getElementById('fPlace').value.trim(),
    note: document.getElementById('fNote').value.trim(),
    rating: selectedRating,
    want_again: false,
    date: new Date().toLocaleDateString('zh-CN'),
    created_at: new Date().toISOString()
  };
  saving = true;
  try {
    const result = await sbFetch('entries', { method: 'POST', body: JSON.stringify(entry) });
    if (result && result[0]) data.unshift(result[0]);
    else { await loadData(); }
    closeModal();
    render();
    updateHeader();
    showToast('已保存');
  } catch(e) {
    showToast('保存失败，请重试');
  }
  saving = false;
}

async function deleteEntry(id) {
  if (!isUnlocked) { showToast('请先解锁编辑模式'); return; }
  if (!confirm('确定删除这条记录？')) return;
  try {
    await sbFetch('entries?id=eq.' + id, { method: 'DELETE' });
    data = data.filter(e => e.id !== id);
    render();
    updateHeader();
    showToast('已删除');
  } catch(e) { showToast('删除失败'); }
}

function render() {
  renderFeed(document.getElementById('searchInput').value || '');
  renderMap();
  renderStats();
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed(document.getElementById('searchInput').value || '');
}

function renderFeed(search) {
  const list = document.getElementById('feedList');
  let entries = [...data];
  if (currentFilter !== 'all') entries = entries.filter(e => e.type === currentFilter);
  if (search) {
    const q = search.toLowerCase();
    entries = entries.filter(e =>
      e.name.toLowerCase().includes(q) ||
      (e.note || '').toLowerCase().includes(q) ||
      e.cuisine_name.toLowerCase().includes(q) ||
      (e.place || '').toLowerCase().includes(q)
    );
  }
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🍽</div><p>${data.length === 0 ? '还没有记录<br>解锁编辑模式后点击下方按钮添加' : '没有找到相关记录'}</p></div>`;
    return;
  }
  list.innerHTML = entries.map(e => `
    <div class="entry-card">
      <div class="entry-dot dot-${e.type}"></div>
      <div class="entry-body">
        <div class="entry-name">${e.name}</div>
        <div class="entry-meta">
          <span class="tag tag-${e.type}">${TYPE_LABELS[e.type]}</span>
          <span class="entry-cuisine">${e.cuisine_name}</span>
          ${e.place ? `<span class="entry-place">· ${e.place}</span>` : ''}
        </div>
        ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
        <div class="entry-footer">
          <span class="entry-date">${e.date || ''}</span>
          <div style="display:flex;gap:6px;align-items:center">
            ${e.rating ? `<span class="entry-rating">${e.rating}</span>` : ''}
            ${isUnlocked ? `<button class="btn-del" onclick="deleteEntry(${e.id})">×</button>` : ''}
          </div>
        </div>
      </div>
    </div>`).join('');
}

function renderMap() {
  const content = document.getElementById('mapContent');
  content.innerHTML = REGIONS.map(region => {
    const cuisines = CUISINES.filter(c => c.region === region);
    return `<div class="map-region">
      <div class="region-title">${region}</div>
      <div class="cuisine-grid">${cuisines.map(c => {
        const count = data.filter(e => e.cuisine_id === c.id).length;
        return `<div class="cuisine-card ${count > 0 ? 'explored' : ''}" onclick="filterByCuisine('${c.id}','${c.name}')">
          <span class="cuisine-name">${c.name}</span>
          <span class="cuisine-badge">${count > 0 ? count : '—'}</span>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function filterByCuisine(id, name) {
  switchTab('feed');
  currentFilter = 'all';
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pill')[0].classList.add('active');
  const input = document.getElementById('searchInput');
  input.value = name;
  renderFeed(name);
}

function renderStats() {
  const total = data.length;
  const cuisinesHit = new Set(data.map(e => e.cuisine_id)).size;
  const mustTry = data.filter(e => e.rating === '必试').length;
  const byType = {ingredient: 0, pairing: 0, restaurant: 0, eating: 0};
  data.forEach(e => { if (byType[e.type] !== undefined) byType[e.type]++; });

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-n" style="color:var(--teal)">${total}</div><div class="stat-l">总记录</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--purple)">${cuisinesHit}</div><div class="stat-l">涉及菜系</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--amber)">${byType.ingredient}</div><div class="stat-l">食材发现</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--coral)">${mustTry}</div><div class="stat-l">必试推荐</div></div>
  `;

  const cuisineRank = CUISINES
    .map(c => ({name: c.name, count: data.filter(e => e.cuisine_id === c.id).length}))
    .filter(c => c.count > 0).sort((a, b) => b.count - a.count).slice(0, 8);
  const max = cuisineRank[0]?.count || 1;
  document.getElementById('chartBars').innerHTML = cuisineRank.length === 0
    ? '<div style="color:var(--text-hint);font-size:13px;text-align:center;padding:20px 0">暂无数据</div>'
    : cuisineRank.map(c => `
      <div class="bar-row">
        <div class="bar-label">${c.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.count / max * 100)}%"></div></div>
        <div class="bar-count">${c.count}</div>
      </div>`).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', ['feed', 'map', 'stats'][i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if (tab === 'feed') renderFeed(document.getElementById('searchInput').value || '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function init() {
  checkSession();
  populateCuisineSelect();
  await loadData();
  render();
  updateHeader();
}

init();
</script>
</body>
</html>
