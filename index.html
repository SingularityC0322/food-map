<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eat as a Local</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#2A7A5C;--teal-l:#EAF5F0;--teal-d:#1A5940;
  --purple:#6B63C4;--purple-l:#EEEDFE;
  --amber:#C88A2A;--amber-l:#FDF3DC;
  --coral:#C4523A;--coral-l:#FAEAE6;
  --blue:#3A7FBF;--blue-l:#E6F1FB;
  --cream:#FAF8F3;--cream-d:#F2EFE7;
  --wb:rgba(60,40,20,0.1);--wb2:rgba(60,40,20,0.15);
  --text:#1C1A16;--tm:#6B6459;--th:#A8A099;
  --r:14px;--rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:0 18px 110px}

/* Header */
.header{padding:36px 0 20px;border-bottom:1px solid var(--wb);margin-bottom:22px}
.header-row{display:flex;justify-content:space-between;align-items:flex-end}
.h-en{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.h-en em{font-style:italic;font-weight:400;color:var(--teal)}
.h-zh{font-size:12px;color:var(--th);margin-top:6px;letter-spacing:0.06em}
.h-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.stat-pill{font-size:12px;color:var(--tm);background:var(--cream-d);border-radius:20px;padding:4px 12px}
.stat-pill b{color:var(--teal)}
.lock-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--th);background:var(--cream-d);border:none;border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit;transition:all .15s}
.lock-btn.on{color:var(--teal-d);background:var(--teal-l)}

/* Nav */
.nav{display:flex;gap:4px;background:white;border:1px solid var(--wb);border-radius:var(--r);padding:4px;margin-bottom:20px;position:sticky;top:8px;z-index:10}
.nav-btn{flex:1;padding:9px 6px;border:none;background:transparent;font-size:13px;color:var(--tm);cursor:pointer;border-radius:var(--rs);transition:all .2s;font-family:inherit}
.nav-btn.active{background:var(--cream);color:var(--text);font-weight:600}
.section{display:none}.section.active{display:block}

/* FAB */
.fab{position:fixed;bottom:26px;right:50%;transform:translateX(50%);max-width:664px;width:calc(100% - 36px);background:var(--teal);color:white;border:none;border-radius:var(--r);padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;z-index:20;transition:background .15s}
.fab:hover{background:var(--teal-d)}
.fab.locked{background:var(--cream-d);color:var(--th);border:1px solid var(--wb2)}

/* Sheets (bottom modal) */
.sheet-wrap{display:none;position:fixed;inset:0;background:rgba(28,26,22,.5);z-index:100;align-items:flex-end;justify-content:center}
.sheet-wrap.open{display:flex}
.sheet{background:white;border-radius:22px 22px 0 0;padding:8px 20px 48px;width:100%;max-width:700px;max-height:93vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--cream-d);border-radius:2px;margin:14px auto 18px}
.sheet-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:20px}
.fg{margin-bottom:16px}
.fl{font-size:11px;color:var(--th);font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:7px}
.fi{width:100%;padding:11px 13px;border:1px solid var(--wb2);border-radius:var(--rs);font-size:15px;font-family:inherit;color:var(--text);background:var(--cream);outline:none;transition:border .15s,background .15s}
.fi:focus{border-color:var(--teal);background:white}
textarea.fi{resize:none;min-height:80px;line-height:1.6}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-p{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;letter-spacing:.2px}
.btn-p:hover{background:var(--teal-d)}
.btn-s{width:100%;padding:12px;background:transparent;color:var(--tm);border:1px solid var(--wb2);border-radius:var(--r);font-size:15px;cursor:pointer;font-family:inherit;margin-top:8px}

/* Toggle buttons */
.tog-row{display:flex;gap:7px;flex-wrap:wrap}
.tog{padding:8px 14px;border:1.5px solid var(--wb2);border-radius:var(--rs);background:white;font-size:13px;cursor:pointer;font-family:inherit;color:var(--tm);transition:all .15s}
.tog:hover{border-color:var(--teal);color:var(--teal)}
.tog.on{font-weight:600}
.tog.c-teal.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal-d)}
.tog.c-purple.on{border-color:var(--purple);background:var(--purple-l);color:#3C3489}
.tog.c-amber.on{border-color:var(--amber);background:var(--amber-l);color:#7A5210}
.tog.c-coral.on{border-color:var(--coral);background:var(--coral-l);color:#8C3425}
.tog.c-blue.on{border-color:var(--blue);background:var(--blue-l);color:#0C447C}

/* Star rating */
.star-row{display:flex;align-items:center;gap:10px}
.stars{display:flex;gap:3px}
.star{font-size:22px;cursor:pointer;color:var(--cream-d);transition:color .1s;user-select:none}
.star.on{color:#E8B84B}
.star-val{font-size:14px;color:var(--tm);min-width:28px}

/* Rating label */
.rl-row{display:flex;gap:6px;flex-wrap:wrap}
.rl{padding:6px 12px;border:1.5px solid var(--wb2);border-radius:20px;background:white;font-size:12px;cursor:pointer;font-family:inherit;color:var(--tm);transition:all .15s}
.rl.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal-d);font-weight:600}

/* Cards common */
.card{background:white;border:1px solid var(--wb);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.card-inner{padding:15px 16px}

/* Restaurant cards */
.rest-card{cursor:pointer;transition:border-color .15s}
.rest-card:hover{border-color:var(--wb2)}
.rest-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.rest-name{font-size:16px;font-weight:600;color:var(--text);line-height:1.3}
.rest-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:600}
.b-wishlist{background:#E6F1FB;color:#0C447C}
.b-visited{background:var(--teal-l);color:var(--teal-d)}
.rest-city{font-size:12px;color:var(--th)}
.rest-cuisine{font-size:12px;color:var(--tm)}
.rest-summary{font-size:13px;color:var(--tm);line-height:1.6;margin-top:6px;font-style:italic;border-top:1px solid var(--wb);padding-top:8px}
.rest-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.dishes-count{font-size:12px;color:var(--th)}
.star-disp{font-size:13px;color:#E8B84B}

/* Dish rows inside restaurant detail */
.dish-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--wb)}
.dish-row:last-child{border-bottom:none}
.dish-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:6px}
.dish-body{flex:1}
.dish-name{font-size:14px;font-weight:600;color:var(--text)}
.dish-note{font-size:13px;color:var(--tm);margin-top:2px;line-height:1.5}
.dish-rating{font-size:12px;color:var(--th);margin-top:2px}

/* Discovery cards */
.disc-card{display:flex}
.disc-bar{width:4px;flex-shrink:0}
.disc-bar.ingredient{background:var(--teal)}
.disc-bar.pairing{background:var(--purple)}
.disc-bar.method{background:var(--amber)}
.disc-bar.inspo{background:var(--blue)}
.disc-body{flex:1;padding:14px 15px}
.disc-name{font-size:15px;font-weight:600;margin-bottom:5px}
.disc-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.disc-note{font-size:13px;color:var(--tm);line-height:1.6;margin-top:5px;border-top:1px solid var(--wb);padding-top:5px;font-style:italic}
.disc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.status-pill{font-size:11px;padding:2px 9px;border-radius:10px}
.sp-done{background:var(--teal-l);color:var(--teal-d);font-weight:600}
.sp-todo{background:var(--blue-l);color:#0C447C}
.sp-homecook{background:var(--amber-l);color:#7A5210}

/* Map */
.map-prog{background:white;border:1px solid var(--wb);border-radius:var(--r);padding:15px 18px;margin-bottom:18px}
.mp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.mp-label{font-size:13px;color:var(--tm)}
.mp-count{font-family:'Playfair Display',serif;font-size:20px;color:var(--teal)}
.mp-track{height:6px;background:var(--cream-d);border-radius:3px;overflow:hidden}
.mp-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .5s}
.map-region{margin-bottom:20px}
.region-title{font-size:11px;font-weight:700;color:var(--th);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
.c-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.c-card{background:white;border:1px solid var(--wb);border-radius:var(--rs);padding:11px 13px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.c-card:hover{background:var(--cream)}
.c-card.explored{border-color:rgba(42,122,92,.3)}
.c-name{font-size:13px;color:var(--text)}
.c-badge{font-size:12px;padding:2px 9px;border-radius:10px;background:var(--cream-d);color:var(--th)}
.c-card.explored .c-badge{background:var(--teal-l);color:var(--teal-d);font-weight:600}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.sc{background:white;border:1px solid var(--wb);border-radius:var(--r);padding:18px}
.sc-n{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;line-height:1;margin-bottom:5px}
.sc-l{font-size:12px;color:var(--tm)}
.chart-sec{background:white;border:1px solid var(--wb);border-radius:var(--r);padding:18px}
.chart-title{font-size:11px;font-weight:700;color:var(--th);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:13px;color:var(--text);width:76px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--cream-d);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--teal);border-radius:3px}
.bar-cnt{font-size:12px;color:var(--th);width:20px;text-align:right;flex-shrink:0}

/* Filters / search */
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;border:1px solid var(--wb2);background:white;font-size:13px;color:var(--tm);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.pill.active{background:var(--text);color:white;border-color:var(--text)}
.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--wb2);border-radius:var(--r);font-size:14px;font-family:inherit;background:white;outline:none;color:var(--text)}
.search-box input:focus{border-color:var(--teal)}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--th);font-size:15px;pointer-events:none}

/* Section headers */
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-hd h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.sec-hd-sub{font-size:12px;color:var(--th)}

/* Detail view */
.detail-wrap{display:none;position:fixed;inset:0;background:var(--cream);z-index:50;overflow-y:auto}
.detail-wrap.open{display:block}
.detail-header{padding:20px 18px 16px;border-bottom:1px solid var(--wb);display:flex;align-items:center;gap:14px;position:sticky;top:0;background:var(--cream);z-index:5}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tm);padding:2px 6px;border-radius:6px;font-family:inherit}
.detail-header h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;flex:1}
.detail-body{padding:20px 18px;max-width:700px;margin:0 auto}
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--th);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.add-dish-btn{width:100%;padding:11px;border:1.5px dashed var(--wb2);border-radius:var(--rs);background:none;font-size:14px;color:var(--th);cursor:pointer;font-family:inherit;transition:all .15s;margin-top:8px}
.add-dish-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-l)}

/* Password */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,.55);z-index:300;align-items:center;justify-content:center}
.pw-overlay.open{display:flex}
.pw-box{background:white;border-radius:20px;padding:32px 28px;width:320px;max-width:90vw;text-align:center}
.pw-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.pw-sub{font-size:13px;color:var(--tm);margin-bottom:22px;line-height:1.5}
.pw-input{width:100%;padding:13px;border:1.5px solid var(--wb2);border-radius:var(--rs);font-size:18px;font-family:inherit;text-align:center;letter-spacing:6px;outline:none;margin-bottom:12px;background:var(--cream)}
.pw-input:focus{border-color:var(--teal);background:white}
.pw-input.err{border-color:var(--coral);animation:shake .3s}
.pw-ok{width:100%;padding:13px;background:var(--teal);color:white;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.pw-no{width:100%;padding:10px;background:transparent;color:var(--th);border:none;font-size:14px;cursor:pointer;font-family:inherit;margin-top:6px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:10px 22px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:56px 20px;color:var(--th)}
.empty-en{font-family:'Playfair Display',serif;font-size:20px;color:var(--cream-d);margin-bottom:10px}
.empty p{font-size:14px;line-height:1.7}
.del-btn{background:none;border:none;cursor:pointer;color:var(--th);font-size:17px;padding:2px 4px;line-height:1;border-radius:4px;transition:all .15s;flex-shrink:0}
.del-btn:hover{color:var(--coral);background:var(--coral-l)}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="h-en">Eat as <em>a Local</em></div>
        <div class="h-zh">我的美食探索地图</div>
      </div>
      <div class="h-right">
        <div class="stat-pill" id="statPill"><b id="sc1">0</b> 家餐厅 · <b id="sc2">0</b> 条发现</div>
        <button id="lockBtn" class="lock-btn" onclick="handleLock()">🔒 <span id="lockTxt">只读</span></button>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('restaurants')">餐厅</button>
    <button class="nav-btn" onclick="switchTab('discoveries')">发现</button>
    <button class="nav-btn" onclick="switchTab('map')">菜系地图</button>
    <button class="nav-btn" onclick="switchTab('stats')">统计</button>
  </div>

  <!-- Restaurants tab -->
  <div id="restaurants" class="section active">
    <div class="filter-row">
      <button class="pill active" onclick="setRestFilter('all',this)">全部</button>
      <button class="pill" onclick="setRestFilter('wishlist',this)">想去 📌</button>
      <button class="pill" onclick="setRestFilter('visited',this)">去过 ✓</button>
    </div>
    <div id="restList"></div>
  </div>

  <!-- Discoveries tab -->
  <div id="discoveries" class="section">
    <div class="search-box">
      <span class="s-icon">⌕</span>
      <input type="text" placeholder="搜索食材、灵感、搭配..." oninput="renderDisc(this.value)" id="discSearch" />
    </div>
    <div class="filter-row">
      <button class="pill active" onclick="setDiscFilter('all',this)">全部</button>
      <button class="pill" onclick="setDiscFilter('ingredient',this)">食材</button>
      <button class="pill" onclick="setDiscFilter('pairing',this)">搭配</button>
      <button class="pill" onclick="setDiscFilter('method',this)">吃法</button>
      <button class="pill" onclick="setDiscFilter('inspo',this)">灵感</button>
      <button class="pill" onclick="setDiscFilter('todo',this)">待尝试</button>
    </div>
    <div id="discList"></div>
  </div>

  <!-- Map tab -->
  <div id="map" class="section">
    <div class="map-prog">
      <div class="mp-top">
        <span class="mp-label">菜系探索进度</span>
        <span class="mp-count" id="mpCount">0 / 0</span>
      </div>
      <div class="mp-track"><div class="mp-fill" id="mpFill" style="width:0%"></div></div>
    </div>
    <div id="mapContent"></div>
  </div>

  <!-- Stats tab -->
  <div id="stats" class="section">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-sec">
      <div class="chart-title">探索最多的菜系</div>
      <div id="chartBars"></div>
    </div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="handleFab()">+ 新记录</button>

<!-- Restaurant sheet -->
<div class="sheet-wrap" id="restSheet" onclick="if(event.target===this)closeSheet('restSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="restSheetTitle">添加餐厅</div>
    <div class="fg">
      <label class="fl">状态</label>
      <div class="tog-row">
        <button class="tog c-blue on" onclick="selTog(this,'restStatus','wishlist')">📌 想去</button>
        <button class="tog c-teal" onclick="selTog(this,'restStatus','visited')">✓ 去过</button>
      </div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">餐厅名称</label><input class="fi" id="rName" placeholder="餐厅名"/></div>
      <div class="fg"><label class="fl">城市</label><input class="fi" id="rCity" placeholder="如：东京、台北"/></div>
    </div>
    <div class="fg">
      <label class="fl">菜系</label>
      <select class="fi" id="rCuisine"></select>
    </div>
    <div id="visitedFields">
      <div class="fg">
        <label class="fl">整体评分</label>
        <div class="star-row">
          <div class="stars" id="restStars"></div>
          <span class="star-val" id="restStarVal">—</span>
        </div>
      </div>
      <div class="fg">
        <label class="fl">评价标签</label>
        <div class="rl-row">
          <button class="rl" onclick="selRl(this,'restLabel','必试')">必试</button>
          <button class="rl" onclick="selRl(this,'restLabel','值得一吃')">值得一吃</button>
          <button class="rl" onclick="selRl(this,'restLabel','一般')">一般</button>
          <button class="rl" onclick="selRl(this,'restLabel','不推荐')">不推荐</button>
        </div>
      </div>
      <div class="fg"><label class="fl">总结（可选）</label><textarea class="fi" id="rSummary" placeholder="整体感受，特色，氛围..."></textarea></div>
    </div>
    <div class="fg" id="sourceField">
      <label class="fl">来源（可选）</label>
      <input class="fi" id="rSource" placeholder="小红书、朋友推荐、自己发现..."/>
    </div>
    <button class="btn-p" onclick="saveRest()">保存</button>
    <button class="btn-s" onclick="closeSheet('restSheet')">取消</button>
  </div>
</div>

<!-- Dish sheet -->
<div class="sheet-wrap" id="dishSheet" onclick="if(event.target===this)closeSheet('dishSheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">添加一道菜</div>
    <div class="fg"><label class="fl">菜名</label><input class="fi" id="dName" placeholder="比如：黑松露炒饭"/></div>
    <div class="fg">
      <label class="fl">评分</label>
      <div class="star-row">
        <div class="stars" id="dishStars"></div>
        <span class="star-val" id="dishStarVal">—</span>
      </div>
    </div>
    <div class="fg">

// ── Supabase ──
async function sb(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.method==='POST'?'return=representation':'',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}
async function loadAll(){
  try{

      sb('restaurants?order=created_at.desc'),
      sb('dishes?order=created_at.asc'),
      sb('discoveries?order=created_at.desc'),
    ]);
    restaurants=restaurants||[];dishes=dishes||[];discoveries=discoveries||[];

}

function buildCuisineSelect(id){

    CUISINES.filter(c=>c.region===r).forEach(c=>{h+=`<option value="${c.id}|${c.name}">${c.name}</option>`});

  });
  document.getElementById(id).innerHTML=h;

}

function selTog(btn,key,val){
  togState[key]=val;
  const row=btn.closest('.tog-row');
  row.querySelectorAll('.tog').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(key==='restStatus'){document.getElementById('visitedFields').style.display=val==='visited'?'block':'none'}
}
function selRl(btn,key,val){
  rlState[key]=val;
  const row=btn.closest('.rl-row');
  row.querySelectorAll('.rl').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function buildStars(containerId,valId,key){
  const c=document.getElementById(containerId);
  c.innerHTML='';
  for(let i=1;i<=5;i++){
    const s=document.createElement('span');
    s.className='star'+(starState[key]>=i?' on':'');
    s.textContent='★';
    s.onclick=(()=>{
      const v=i;
      return()=>{starState[key]=v;buildStars(containerId,valId,key);document.getElementById(valId).textContent=v+'.0'}
    })();
    // half star on right half click - simplified to 0.5 steps via dblclick
    c.appendChild(s);
  }
}

  if(!r)return;
  document.getElementById('detailName').textContent=r.name;
  document.getElementById('detailMeta').innerHTML=`
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
      <span class="badge ${r.status==='wishlist'?'b-wishlist':'b-visited'}">${r.status==='wishlist'?'📌 想去':'✓ 去过'}</span>
      ${r.cuisine_name?`<span class="badge" style="background:var(--cream-d);color:var(--tm)">${r.cuisine_name}</span>`:''}
      ${r.city?`<span style="font-size:13px;color:var(--th)">${r.city}</span>`:''}
      ${r.rating?`<span style="font-size:14px;color:#E8B84B">${r.rating} ★</span>`:''}
      ${r.rating_label?`<span class="badge b-visited">${r.rating_label}</span>`:''}
    </div>
    ${r.summary?`<div style="font-size:14px;color:var(--tm);line-height:1.7;font-style:italic;padding:12px 14px;background:var(--cream);border-radius:var(--rs);border:1px solid var(--wb)">${r.summary}</div>`:''}
    ${r.source?`<div style="font-size:12px;color:var(--th);margin-top:8px">来源：${r.source}</div>`:''}
  `;
  const myDishes=dishes.filter(d=>d.restaurant_id===id);
  document.getElementById('dishRows').innerHTML=myDishes.length?myDishes.map(d=>`
    <div class="dish-row">
      <div class="dish-dot"></div>
      <div class="dish-body">
        <div class="dish-name">${d.name}</div>
        ${d.note?`<div class="dish-note">${d.note}</div>`:''}
        <div class="dish-rating">${d.rating?d.rating+' ★ ':''}${d.rating_label||''}</div>
      </div>
      ${isUnlocked?`<button class="del-btn" onclick="deleteDish(${d.id})">×</button>`:''}
    </div>`).join(''):'<div style="color:var(--th);font-size:13px;padding:8px 0">还没有菜品记录</div>';
  const relDiscs=discoveries.filter(d=>d.restaurant_id===id);
  document.getElementById('relatedDiscs').innerHTML=relDiscs.length?relDiscs.map(d=>`
    <div style="display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--wb)">
      <div style="width:4px;height:4px;border-radius:50%;background:var(--teal);flex-shrink:0"></div>
      <span style="font-size:14px;font-weight:600">${d.name}</span>
      <span class="badge" style="background:var(--teal-l);color:var(--teal-d)">${TYPE_LABELS[d.type]||d.type}</span>
    </div>`).join(''):'<div style="color:var(--th);font-size:13px;padding:8px 0">暂无相关发现</div>';
  document.getElementById('addDishBtn').style.display=isUnlocked?'block':'none';
  document.getElementById('detailDelBtn').style.display=isUnlocked?'block':'none';
}

// ── Render discoveries ──
function setDiscFilter(f,btn){discFilter=f;document.querySelectorAll('#discoveries .pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderDisc(discSearch)}
function renderDisc(search){
  discSearch=search||'';
  const list=document.getElementById('discList');
  let items=[...discoveries];
  if(discFilter==='todo')items=items.filter(d=>d.status==='todo');
  else if(discFilter!=='all')items=items.filter(d=>d.type===discFilter);
  if(discSearch){const q=discSearch.toLowerCase();items=items.filter(d=>d.name.toLowerCase().includes(q)||(d.note||'').toLowerCase().includes(q)||(d.cuisine_name||'').toLowerCase().includes(q))}
  if(!items.length){list.innerHTML=`<div class="empty"><div class="empty-en">Nothing here yet</div><p>${discoveries.length===0?'还没有发现记录':'没有找到相关记录'}</p></div>`;return}
  list.innerHTML=items.map(d=>`
    <div class="card disc-card">
      <div class="disc-bar ${d.type}"></div>
      <div class="disc-body">
        <div class="disc-name">${d.name}</div>
        <div class="disc-meta">
          <span class="badge" style="background:var(--${TYPE_COLORS[d.type]||'teal'}-l,var(--teal-l));color:var(--${TYPE_COLORS[d.type]||'teal'}-d,var(--teal-d))">${TYPE_LABELS[d.type]||d.type}</span>
          ${d.cuisine_name?`<span style="font-size:12px;color:var(--tm)">${d.cuisine_name}</span>`:''}
          ${d.restaurant_name?`<span style="font-size:12px;color:var(--th)">· ${d.restaurant_name}</span>`:''}
        </div>
        ${d.note?`<div class="disc-note">${d.note}</div>`:''}
        <div class="disc-footer">
          <span class="status-pill ${STATUS_CLASSES[d.status]||'sp-done'}">${STATUS_LABELS[d.status]||d.status}</span>
          ${isUnlocked?`<button class="del-btn" onclick="deleteDisc(${d.id})">×</button>`:''}
        </div>
      </div>
    </div>`).join('');
}

// ── Map ──
function renderMap(){
  const visited=new Set(restaurants.filter(r=>r.status==='visited').map(r=>r.cuisine_id));
  const total=CUISINES.length;
  const exp=visited.size;
  document.getElementById('mpCount').textContent=`${exp} / ${total}`;
  document.getElementById('mpFill').style.width=Math.round(exp/total*100)+'%';
  document.getElementById('mapContent').innerHTML=REGIONS.map(region=>{
    const cuisines=CUISINES.filter(c=>c.region===region);
    return`<div class="map-region"><div class="region-title">${region}</div>
    <div class="c-grid">${cuisines.map(c=>{
      const rests=restaurants.filter(r=>r.cuisine_id===c.id&&r.status==='visited');
      return`<div class="c-card ${rests.length?'explored':''}" onclick="filterMapCuisine('${c.id}','${c.name}')">
        <span class="c-name">${c.name}</span>
        <span class="c-badge">${rests.length||'—'}</span>
      </div>`;
    }).join('')}</div></div>`;
  }).join('');
}
function filterMapCuisine(id,name){
  switchTab('restaurants');
  restFilter='all';
  document.querySelectorAll('#restaurants .pill').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#restaurants .pill')[0].classList.add('active');
  // filter inline
  const list=document.getElementById('restList');
  const items=restaurants.filter(r=>r.cuisine_id===id);
  if(!items.length){list.innerHTML=`<div class="empty"><p>该菜系暂无餐厅记录</p></div>`;return}
  restFilter='__custom__';
  document.getElementById('restList').innerHTML=items.map(r=>{
    const dcount=dishes.filter(d=>d.restaurant_id===r.id).length;
    return`<div class="card rest-card" onclick="openDetail(${r.id})">
      <div class="card-inner">
        <div class="rest-top"><div class="rest-name">${r.name}</div><span class="badge ${r.status==='wishlist'?'b-wishlist':'b-visited'}">${r.status==='wishlist'?'📌 想去':'✓ 去过'}</span></div>
        <div class="rest-meta">${r.cuisine_name?`<span class="rest-cuisine">${r.cuisine_name}</span>`:''} ${r.city?`<span class="rest-city">· ${r.city}</span>`:''}</div>
        <div class="rest-footer"><span class="dishes-count">${dcount?dcount+'道菜':'暂无菜品记录'}</span><span>${r.rating?`<span style="color:#E8B84B;font-size:13px">${r.rating} ★</span>`:''}</span></div>
      </div></div>`;
  }).join('');
}

// ── Stats ──
function renderStats(){
  const total=restaurants.length;
  const wishlist=restaurants.filter(r=>r.status==='wishlist').length;
  const visited=restaurants.filter(r=>r.status==='visited').length;
  const discTotal=discoveries.length;
  document.getElementById('statsGrid').innerHTML=`
    <div class="sc"><div class="sc-n" style="color:var(--teal)">${visited}</div><div class="sc-l">去过的餐厅</div></div>
    <div class="sc"><div class="sc-n" style="color:var(--blue)">${wishlist}</div><div class="sc-l">想去的餐厅</div></div>
    <div class="sc"><div class="sc-n" style="color:var(--purple)">${dishes.length}</div><div class="sc-l">菜品记录</div></div>
    <div class="sc"><div class="sc-n" style="color:var(--amber)">${discTotal}</div><div class="sc-l">发现记录</div></div>
  `;
  const cuisineRank=CUISINES.map(c=>({name:c.name,count:restaurants.filter(r=>r.cuisine_id===c.id&&r.status==='visited').length})).filter(c=>c.count>0).sort((a,b)=>b.count-a.count).slice(0,8);
  const max=cuisineRank[0]?.count||1;
  document.getElementById('chartBars').innerHTML=cuisineRank.length?cuisineRank.map(c=>`
    <div class="bar-row"><div class="bar-lbl">${c.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.count/max*100)}%"></div></div><div class="bar-cnt">${c.count}</div></div>`).join('')
    :'<div style="color:var(--th);font-size:13px;text-align:center;padding:20px 0">暂无数据</div>';
}

// ── Header ──
function updateHeader(){
  document.getElementById('sc1').textContent=restaurants.length;
  document.getElementById('sc2').textContent=discoveries.length;
}

function renderAll(){renderRests();renderDisc(discSearch);renderMap();renderStats()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

async function init(){
  checkSession();
  buildCuisineSelect('rCuisine');
  buildCuisineSelect('diCuisine');
  await loadAll();
  renderAll();
  updateHeader();
}
init();
</script>
</body>
</html>
